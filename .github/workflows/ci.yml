name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; else echo "No requirements.txt found"; fi

      - name: Run tests
        run: |
          # Run unit tests if test file exists
          if [ -f "./Student Database System/test_student_grade.py" ]; then \
            python -m unittest discover -s "Student Database System" -p "test_student_grade.py"; \
          else \
            echo "No test file found"; \
          fi